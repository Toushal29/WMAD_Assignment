{% extends 'web_app/main_page/base.html' %}
{% load static %}

{% block title %}Order{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'web_app/css/order.css' %}">
<style>
    * {
        padding: 0;
        margin: 0;
    }
    body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-image: url("{% static 'web_app/images/bk_img6.png' %}");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        overflow: hidden;
    }
</style>
{% endblock %}

{% block content %}

<h1>Place an Order</h1>

<div class="menu-container">
    {% for item in items %}
    <div class="card" data-id="{{ item.id }}">
        <img src="{{ item.image.url }}" class="card-img">
        <h3 class="food-name">{{ item.name }}</h3>
        <p class="price">Rs {{ item.price }}</p>
        <div class="quantity-container">
            <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
            <input type="number" class="quantity" value="1" style="width: 50px; text-align: center; margin: 0 10px;">
            <button class="qty-btn" onclick="changeQty(this, 1)">+</button>
        </div>
        <button class="add-cart-btn" onclick="addToCart(this)">Add to Cart</button>
    </div>
    {% endfor %}
</div>

<a href="{% url 'my_orders' %}" class="my-orders-btn">View My Orders</a>

<script src="{% static 'web_app/js/order.js' %}"></script>
{% endblock %}
