{% load static %}
<link rel="stylesheet" href="{% static 'web_app/css/navbar.css' %}">

<header>
    <nav class="navbar">
        <div class="logo">
            <a href="/">Saveur Moris</a>
        </div>
        <div class="mainNav">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/menu/">Menu</a></li>
                <li><a href="/order/">Order</a></li>
                <li><a href="/reservation/">Reservation</a></li>
                <li><a href="/reviews/">Reviews</a></li>
                <li><a href="/about-contact/">About & Contact</a></li>
            </ul>
        </div>
        <div class="login-container">
            <div class="cart-wrapper">
                <button id="cart-toggle" class="cart-nav-btn">Cart</button>
                <span id="cart-count" class="cart-count">0</span>
            </div>

            {% if user.is_authenticated %}
            <div class="user-dropdown">
                <span class="username">Hi, {{ user.username }}</span>
                <div class="dropdown-content">
                    {% if user.is_staff or user.is_superuser %}
                    <a href="/admin/">Admin Panel</a>
                    {% else %}
                    <a href="/profile/">Profile</a>
                    {% endif %}
                    <a href="/account/logout/">Logout</a>
                </div>
            </div>
            {% else %}
            <a href="/login/" class="login-link">Log In</a>
            {% endif %}

            <button class="hamburger" id="navToggle">Menu</button>
        </div>
    </nav>

    <div id="cart-dropdown" class="cart-dropdown">
        <div class="cart-header">
            <span>Cart</span>
            <button id="cart-close">X</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <p id="cart-total"></p>
        <button id="refresh-cart">Clear Cart</button>
        <button id="checkout-btn">Checkout</button>
    </div>
</header>
